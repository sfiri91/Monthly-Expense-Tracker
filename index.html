<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Expenses"/>
  <meta name="theme-color" content="#0f1117"/>
  <title>Monthly Expenses</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Inter:wght@400;500;600&display=swap');

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: rgba(255,255,255,0.08);
      --text: #f0f2f8;
      --muted: #7a8099;
      --blue: #3b9ee8;
      --blue-dark: #1a6fb5;
      --amber: #e09a30;
      --red: #e05252;
      --radius: 16px;
      --radius-sm: 10px;
      --safe-top: env(safe-area-inset-top);
      --safe-bot: env(safe-area-inset-bottom);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      height: 100%;
      overscroll-behavior: none;
    }

    body {
      padding-top: calc(var(--safe-top) + 16px);
      padding-bottom: calc(var(--safe-bot) + 16px);
      padding-left: 16px;
      padding-right: 16px;
      overflow-y: auto;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 20px;
    }

    /* ── Layout ── */
    .main-layout {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Cylinder ── */
    .cylinder-row {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .cyl-wrap { flex-shrink: 0; }
    .cyl-svg { width: 80px; height: 240px; overflow: visible; display: block; }

    .liquid-fill {
      transition: height 0.7s cubic-bezier(0.4,0,0.2,1), y 0.7s cubic-bezier(0.4,0,0.2,1), fill 0.5s ease;
    }
    .meniscus {
      transition: cy 0.7s cubic-bezier(0.4,0,0.2,1), fill 0.5s ease;
    }

    .cyl-stats {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .stat-block { display: flex; flex-direction: column; gap: 2px; }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .stat-val {
      font-family: 'DM Mono', monospace;
      font-size: 19px;
      font-weight: 500;
    }
    .stat-val.danger { color: var(--red); }
    .stat-val.warn   { color: var(--amber); }
    .stat-val.safe   { color: var(--blue); }

    .usage-bar-wrap {
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 4px;
    }
    .usage-bar {
      height: 100%;
      border-radius: 2px;
      background: var(--blue);
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1), background 0.4s;
      width: 0%;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }

    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* ── Inputs ── */
    .input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    input[type=text], input[type=number] {
      background: var(--surface2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 16px;
      padding: 10px 12px;
      outline: none;
      width: 100%;
      -webkit-appearance: none;
    }
    input[type=text]::placeholder, input[type=number]::placeholder {
      color: var(--muted);
    }
    input:focus {
      border-color: var(--blue);
    }

    .unit {
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      color: var(--muted);
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      padding: 11px 18px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-primary:active { transform: scale(0.96); background: var(--blue-dark); }

    .btn-ghost {
      background: transparent;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      padding: 6px 12px;
      cursor: pointer;
    }
    .btn-ghost:active { background: var(--surface2); }

    .salary-confirmed {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .salary-big {
      font-family: 'DM Mono', monospace;
      font-size: 24px;
      font-weight: 500;
    }

    /* ── Expense form ── */
    .expense-form { display: flex; flex-direction: column; gap: 10px; }

    /* ── Overflow warning ── */
    .warning-box {
      background: rgba(224,82,82,0.12);
      border: 0.5px solid rgba(224,82,82,0.3);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px;
      color: var(--red);
      display: none;
    }
    .warning-box.show { display: block; }

    /* ── Expense list ── */
    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .btn-clear {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }
    .btn-clear:active { color: var(--red); }

    .expense-list { display: flex; flex-direction: column; gap: 0; }

    .expense-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 0.5px solid var(--border);
      animation: slideIn 0.25s ease;
    }
    .expense-item:last-child { border-bottom: none; padding-bottom: 0; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(10px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .exp-name {
      flex: 1;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .exp-pct {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }
    .exp-amt {
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      min-width: 85px;
      text-align: right;
    }
    .btn-del {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      padding: 4px 0 4px 8px;
      line-height: 1;
    }
    .btn-del:active { color: var(--red); }

    .empty-msg {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      padding: 20px 0;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <h1>Monthly Expenses</h1>
  <p class="subtitle">Track your budget at a glance</p>

  <div class="main-layout">

    <!-- Cylinder + live stats -->
    <div class="cylinder-row">
      <div class="cyl-wrap">
        <svg class="cyl-svg" viewBox="0 0 80 240" id="cylSvg">
          <defs>
            <clipPath id="cylClip">
              <rect x="14" y="18" width="52" height="200" rx="2"/>
            </clipPath>
          </defs>
          <g id="gradMarks"></g>
          <g clip-path="url(#cylClip)">
            <rect id="liquidRect" x="14" y="218" width="52" height="0" fill="#3b9ee8" class="liquid-fill"/>
            <ellipse id="meniscus" cx="40" cy="218" rx="26" ry="5" fill="#5ab4f0" class="meniscus"/>
            <ellipse id="foamEllipse" cx="40" cy="218" rx="26" ry="3" fill="rgba(140,200,255,0.18)" class="meniscus"/>
          </g>
          <rect x="14" y="18" width="52" height="200" rx="3" fill="rgba(180,220,255,0.06)" stroke="rgba(180,220,255,0.3)" stroke-width="1"/>
          <rect x="18" y="21" width="6" height="194" rx="2" fill="rgba(255,255,255,0.06)"/>
          <ellipse cx="40" cy="18" rx="26" ry="6" fill="rgba(180,220,255,0.1)" stroke="rgba(180,220,255,0.32)" stroke-width="1"/>
          <ellipse cx="40" cy="218" rx="26" ry="6" fill="rgba(140,190,230,0.12)" stroke="rgba(140,190,230,0.22)" stroke-width="0.8"/>
          <rect x="8" y="222" width="64" height="10" rx="4" fill="rgba(140,190,230,0.12)" stroke="rgba(180,220,255,0.2)" stroke-width="0.8"/>
        </svg>
      </div>

      <div class="cyl-stats" id="cylStats">
        <div class="stat-block">
          <div class="stat-label">Remaining</div>
          <div class="stat-val safe" id="statRemaining">—</div>
        </div>
        <div class="stat-block">
          <div class="stat-label">Spent</div>
          <div class="stat-val" id="statSpent">—</div>
        </div>
        <div class="stat-block">
          <div class="stat-label">Usage</div>
          <div class="stat-val" id="statPct">—</div>
          <div class="usage-bar-wrap">
            <div class="usage-bar" id="usageBar"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Salary card -->
    <div class="card" id="salaryCard">
      <div class="section-label">Monthly net salary</div>

      <div id="salaryForm">
        <div class="input-row">
          <input type="number" id="salaryInput" placeholder="e.g. 45000" min="1" inputmode="numeric"/>
          <span class="unit">Kč</span>
          <button class="btn-primary" onclick="setSalary()">Set salary</button>
        </div>
      </div>

      <div id="salaryConfirmed" class="hidden">
        <div class="salary-confirmed">
          <span class="salary-big" id="salaryBig"></span>
          <button class="btn-ghost" onclick="editSalary()">Change</button>
        </div>
      </div>
    </div>

    <!-- Overflow warning -->
    <div class="warning-box" id="overflowWarn">
      ⚠️ Budget exceeded! You are over by <strong id="overAmount"></strong>.
    </div>

    <!-- Add expense card -->
    <div class="card hidden" id="addCard">
      <div class="section-label">Add expense</div>
      <div class="expense-form">
        <input type="text" id="expName" placeholder="Description (e.g. Rent, Groceries)"/>
        <div class="input-row">
          <input type="number" id="expAmt" placeholder="Amount" min="0.01" step="0.01" inputmode="decimal" style="flex:1"/>
          <span class="unit">Kč</span>
          <button class="btn-primary" onclick="addExpense()">+ Add</button>
        </div>
      </div>
    </div>

    <!-- Expense list card -->
    <div class="card hidden" id="listCard">
      <div class="list-header">
        <div class="section-label" style="margin:0">Expenses this month</div>
        <button class="btn-clear" onclick="clearAll()">Clear all</button>
      </div>
      <div class="expense-list" id="expenseList">
        <div class="empty-msg">No expenses yet.</div>
      </div>
    </div>

  </div>

  <script>
    const CYLL_TOP = 18, CYLL_BOT = 218, CYLL_H = 200;
    let salary = 0, expenses = [];

    function fmt(n) {
      return Math.round(n).toLocaleString('cs-CZ');
    }

    function setSalary() {
      const v = parseFloat(document.getElementById('salaryInput').value);
      if (!v || v <= 0) {
        document.getElementById('salaryInput').style.borderColor = 'var(--red)';
        return;
      }
      document.getElementById('salaryInput').style.borderColor = '';
      salary = v;
      expenses = [];
      document.getElementById('salaryForm').classList.add('hidden');
      document.getElementById('salaryConfirmed').classList.remove('hidden');
      document.getElementById('salaryBig').textContent = fmt(salary) + ' Kč';
      document.getElementById('addCard').classList.remove('hidden');
      document.getElementById('listCard').classList.remove('hidden');
      renderList();
      updateCylinder();
    }

    function editSalary() {
      salary = 0; expenses = [];
      document.getElementById('salaryForm').classList.remove('hidden');
      document.getElementById('salaryConfirmed').classList.add('hidden');
      document.getElementById('salaryInput').value = '';
      document.getElementById('addCard').classList.add('hidden');
      document.getElementById('listCard').classList.add('hidden');
      document.getElementById('overflowWarn').classList.remove('show');
      renderList();
      updateCylinder();
    }

    function addExpense() {
      const name = document.getElementById('expName').value.trim() || 'Expense';
      const amt = parseFloat(document.getElementById('expAmt').value);
      if (!amt || amt <= 0) {
        document.getElementById('expAmt').style.borderColor = 'var(--red)';
        return;
      }
      document.getElementById('expAmt').style.borderColor = '';
      expenses.push({ name, amt, id: Date.now() });
      document.getElementById('expName').value = '';
      document.getElementById('expAmt').value = '';
      renderList();
      updateCylinder();
    }

    function deleteExpense(id) {
      expenses = expenses.filter(e => e.id !== id);
      renderList(); updateCylinder();
    }

    function clearAll() {
      expenses = []; renderList(); updateCylinder();
    }

    function renderList() {
      const el = document.getElementById('expenseList');
      if (!expenses.length) {
        el.innerHTML = '<div class="empty-msg">No expenses yet.</div>';
        return;
      }
      el.innerHTML = expenses.map(e => {
        const pct = salary > 0 ? ((e.amt / salary) * 100).toFixed(1) : '—';
        return `<div class="expense-item">
          <span class="exp-name" title="${e.name}">${e.name}</span>
          <span class="exp-pct">${pct}%</span>
          <span class="exp-amt">${fmt(e.amt)} Kč</span>
          <button class="btn-del" onclick="deleteExpense(${e.id})" aria-label="Remove">×</button>
        </div>`;
      }).join('');
    }

    function updateCylinder() {
      const total = expenses.reduce((s, e) => s + e.amt, 0);
      const remaining = salary - total;
      const spentPct = salary > 0 ? Math.min(total / salary, 1) : 0;
      const fillPct  = salary > 0 ? Math.max(1 - spentPct, 0) : 0;
      const fillH = Math.round(fillPct * CYLL_H);
      const newY  = CYLL_BOT - fillH;

      const liq  = document.getElementById('liquidRect');
      const men  = document.getElementById('meniscus');
      const foam = document.getElementById('foamEllipse');
      liq.setAttribute('y', newY);
      liq.setAttribute('height', fillH);
      men.setAttribute('cy', newY);
      foam.setAttribute('cy', newY - 2);

      const color    = spentPct >= 1 ? '#e05252' : spentPct >= 0.75 ? '#e09a30' : '#3b9ee8';
      const menColor = spentPct >= 1 ? '#f07070' : spentPct >= 0.75 ? '#f0b855' : '#5ab4f0';
      liq.setAttribute('fill', color);
      men.setAttribute('fill', menColor);

      // Stats
      const statR = document.getElementById('statRemaining');
      statR.textContent = salary > 0 ? (remaining >= 0 ? fmt(remaining) : '-' + fmt(Math.abs(remaining))) + ' Kč' : '—';
      statR.className = 'stat-val ' + (salary === 0 ? '' : remaining < 0 ? 'danger' : remaining < salary * 0.2 ? 'warn' : 'safe');

      document.getElementById('statSpent').textContent = salary > 0 ? fmt(total) + ' Kč' : '—';

      const statP = document.getElementById('statPct');
      const pctNum = salary > 0 ? Math.min(Math.round(spentPct * 100), 100) : 0;
      statP.textContent = salary > 0 ? pctNum + '%' : '—';
      statP.className = 'stat-val ' + (spentPct >= 1 ? 'danger' : spentPct >= 0.75 ? 'warn' : 'safe');

      const bar = document.getElementById('usageBar');
      bar.style.width = pctNum + '%';
      bar.style.background = color;

      // Overflow
      const warn = document.getElementById('overflowWarn');
      if (salary > 0 && total > salary) {
        warn.classList.add('show');
        document.getElementById('overAmount').textContent = fmt(total - salary) + ' Kč';
      } else {
        warn.classList.remove('show');
      }

      drawGradMarks();
    }

    function drawGradMarks() {
      const g = document.getElementById('gradMarks');
      let html = '';
      for (let i = 0; i <= 10; i++) {
        const y = CYLL_BOT - (i / 10) * CYLL_H;
        const major = i % 5 === 0;
        html += `<line x1="${major ? 10 : 12}" y1="${y}" x2="14" y2="${y}" stroke="rgba(140,190,230,0.4)" stroke-width="${major ? 1 : 0.7}"/>`;
        if (major) {
          html += `<text x="8" y="${y + 3.5}" text-anchor="end" font-family="'DM Mono',monospace" font-size="6.5" fill="rgba(140,190,230,0.6)">${i * 10}%</text>`;
        }
      }
      g.innerHTML = html;
    }

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      if (document.activeElement.id === 'salaryInput') setSalary();
      if (document.activeElement.id === 'expAmt' || document.activeElement.id === 'expName') addExpense();
    });

    drawGradMarks();
    updateCylinder();
  </script>
</body>
</html>
